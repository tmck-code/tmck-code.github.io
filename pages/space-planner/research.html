# Shed Shelving Plan — Research Report

**Shed:** 2200 W × 1490 D × 1750 H (mm) · door centered on the 2200 mm wall
**Lawnmower:** 1200 L × 570 W × 1000 H (mm)
**Priority:** Heavy-duty / durable · mixed heights OK · half-height OK

> Method: fan-out web search across AU vendors → 20 sources fetched → 80 falsifiable claims extracted → 25 adversarially verified (24 confirmed, 1 killed).

---

## The finding that drives everything: height kills most heavy-duty units

Your shed ceiling is **1750 mm**. Almost every genuinely heavy-duty steel unit sold in Australia is built **1800–2090 mm tall** and *will not fit* — including your reference Pinnacle (2090 mm) and its 600 kg/shelf adjustable sibling (1830 mm, only 80 mm too tall).

The winning strategy is therefore either:

1. the few heavy units that ship **under 1700 mm**, or
2. exploiting your **"half-height is fine"** allowance to run a bombproof low bench.

**Geometry is generous.** A back-wall shelf (400 mm deep) + lawnmower parked sideways in front (570 mm deep) = 970 mm, leaving a ~520 mm walkway inside your 1490 mm depth. Everything below fits with margin.

---

## Layout mockups (top-down · back wall at top · door centered front)

### 🟢 Option A — Easiest, all off-the-shelf, zero modification *(recommended)*

Two Urban-series units tiled across the back (2100 mm span) + cheap Hammerfast on the side wall. Nothing to cut.

```
   ←─────────────── 2200 wide ───────────────→
  ┌─────────────────────────────────────────┐  ▲
  │ [Pinnacle 900 ] [ Pinnacle 1200×400    ] │  │  back wall (shelves, 400 deep)
  │  1045H,300D       1510H                  │  │
  │ ┌──┐                                     │  │
  │ │H │      [ ░░ MOWER 1200×570 ░░ ]       │ 1490
  │ │81│       parked sideways in front      │ deep
  │ │3 │                                     │  │
  │ └──┘            · walkway ·              │  ▼
  └──────────────███ DOOR ███────────────────┘
```

**Bill of materials:** Pinnacle 1510×1200 ($389) + Pinnacle 1045×900 (~$229) + Hammerfast side ($61) → **≈ $679**
Heaviest shelf rating 200 kg. All units ≤ 1510 mm — heaps of headroom.

### 🟡 Option B — Budget

Drop the pricey 1510 unit; use a cheap Hammerfast on the back too.

```
  ┌─────────────────────────────────────────┐
  │ [ Pinnacle 1200×400, 200kg ][Hammerfast] │  back wall
  │ ┌────┐                                   │
  │ │Stor│     [ ░░ MOWER 1200×570 ░░ ]      │
  │ │mor │                                   │
  │ │800 │           · walkway ·             │
  └──────────────███ DOOR ███────────────────┘
```

**Bill of materials:** Pinnacle 1510×1200 ($389) + Hammerfast back ($61) + Stormor 800 side (~$150) → **≈ $600**
*Cheapest-cheapest:* 2× Hammerfast back + 1 side ≈ $185, but only 150 kg/shelf and 313 mm shallow.

### 🔵 Option C — Max heavy-duty, using your "half-height OK" allowance 🏆

Run a **half-height (916 mm) Rack It bench at 1000 kg/shelf** across the back — fits *easily* under 1750 because it's deliberately low — plus a fitting side unit. The bombproof, "store an engine block on it" option.

```
  ┌─────────────────────────────────────────┐
  │ [══ Rack It 1800-wide, 916mm tall ══]    │  back: 1000kg/shelf half-height bench
  │ ┌────┐                                   │
  │ │Pin │     [ ░░ MOWER 1200×570 ░░ ]      │
  │ │900 │        (reach over the bench)     │
  │ └────┘            · walkway ·            │
  └──────────────███ DOOR ███────────────────┘
```

**Bill of materials:** Rack It 1000 kg run on **916 mm uprights** (~$550–670, [base bundle](https://www.bunnings.com.au/rack-it-1000kg-1800mm-wide-4-shelf-unit_bbundle0313) + swap to short posts) + Pinnacle 1045×900 side (~$229) → **≈ $780–900**
Trade-off: you lose tall storage at the back (it's a waist-high bench) but gain the highest load rating available and walk-over reach to the mower.

---

## Recommendation

**Option A** is the sweet spot: genuinely heavy-duty (200 kg/shelf), full-height-usable, full back-wall coverage, fits as-is with no cutting, ~$680. If you truly want industrial 1000 kg capacity and accept a low back bench, **Option C** delivers it via the half-height trick you already approved.

## Before you buy — verify 3 things

1. **Confirm the Pinnacle 900-wide and Stormor prices** on their AU pages today (NZ-mirror data; not shown on the AU listing).
2. **Dimension order varies** by retailer (some H×W×D, some W×D×H). Every "fits / doesn't fit" verdict above was height-cross-checked, but re-read the spec tab.
3. **Rack It half-height build** — confirm in-store that an 1800 mm beam + 916 mm uprights + the 1000 kg shelf rating combine in one bay (uprights sold separately from the bundle).

---

<script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
<script>
  const slug = s => s.toLowerCase().replace(/[^\w\s-]/g,'').trim().replace(/\s+/g,'-').slice(0,60);

  function render(src){
    marked.setOptions({gfm:true, breaks:true});
    const tokens = marked.lexer(src);
    // collect headings for TOC and assign ids
    const heads=[];
    const renderer=new marked.Renderer();
    renderer.heading=(text,level)=>{
      const plain=text.replace(/<[^>]+>/g,'');
      const id=slug(plain);
      let cls='';
      if(level===3){
        if(/^🟢/.test(plain)) cls=' class="opt-good"';
        else if(/^🟡/.test(plain)) cls=' class="opt-warn"';
        else if(/^🔵/.test(plain)) cls=' class="opt-acc"';
      }
      if(level===2||level===3) heads.push({level,id,text:plain});
      return `<h${level} id="${id}"${cls}>${text}</h${level}>`;
    };
    renderer.table=(header,body)=>`<div class="tablewrap"><table><thead>${header}</thead><tbody>${body}</tbody></table></div>`;
    renderer.link=(href,title,text)=>{
      const ext=/^https?:/.test(href);
      return `<a href="${href}"${ext?' target="_blank" rel="noopener"':''}${title?` title="${title}"`:''}>${text}</a>`;
    };
    const html=marked.parser(tokens,{renderer});
    document.getElementById('content').innerHTML=html;
    buildTOC(heads);
    setupScrollspy();
  }

  function buildTOC(heads){
    const toc=document.getElementById('toc');
    heads.forEach(h=>{
      const a=document.createElement('a');
      a.href='#'+h.id; a.textContent=h.text;
      if(h.level===3) a.className='lvl3';
      toc.appendChild(a);
    });
  }

  function setupScrollspy(){
    const links=[...document.querySelectorAll('#toc a')];
    const map=new Map(links.map(a=>[a.getAttribute('href').slice(1),a]));
    const obs=new IntersectionObserver(entries=>{
      entries.forEach(e=>{
        if(e.isIntersecting){
          links.forEach(l=>l.classList.remove('active'));
          const a=map.get(e.target.id);
          if(a) a.classList.add('active');
        }
      });
    },{rootMargin:'-80px 0px -70% 0px',threshold:0});
    document.querySelectorAll('article h2[id],article h3[id]').forEach(h=>obs.observe(h));
  }

  // Prefer the live .md file (single source of truth); fall back to the inline copy
  // so the page also works when opened directly via file://.
  const inline=document.getElementById('md').textContent;
  fetch('shelving-research.md')
    .then(r=>r.ok?r.text():Promise.reject())
    .then(render)
    .catch(()=>render(inline));
</script>
